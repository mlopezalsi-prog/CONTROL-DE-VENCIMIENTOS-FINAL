/* ===== ALSI REV21 - Ajuste visual seguro SUAVE (solo estética) ===== */
:root{
  --shadow-soft:0 8px 22px rgba(15,23,42,.065);
  --row-select:#eef6ff;
  --row-hover:#f8fbff;
}
@keyframes viewSoftFade{from{opacity:.92;transform:translateY(2px)}to{opacity:1;transform:translateY(0)}}
@keyframes rowSoftSelect{from{box-shadow:inset 0 0 0 rgba(37,99,235,0)}to{box-shadow:inset 3px 0 0 rgba(37,99,235,.78)}}

.content{animation:viewSoftFade .12s ease-out both!important;}
.content.view-switching{animation:viewSoftFade .12s ease-out both!important;}
.content.view-switching>*{animation:none!important;}
.panel,.card,.final-card,.modal-card{transition:box-shadow .16s ease,border-color .16s ease,background .16s ease!important;}
.panel:hover,.card:hover{box-shadow:var(--shadow-soft);}

/* Filas: selección/hover sutil, sin saltos */
tbody tr{position:relative;transition:background .13s ease,box-shadow .13s ease!important;}
tbody tr:hover{background:var(--row-hover)!important;box-shadow:inset 3px 0 0 rgba(37,99,235,.28);}
tbody tr.alsi-row-selected{background:var(--row-select)!important;animation:rowSoftSelect .12s ease-out both;}
tbody tr.alsi-row-selected td:first-child{font-weight:950;color:#1d4ed8;}

/* Acciones: animación más profesional, sin pop fuerte */
.icon-actions{gap:7px;}
.icon-btn{transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease,background .12s ease!important;}
.icon-btn:hover{transform:translateY(-1px)!important;box-shadow:0 8px 18px rgba(15,23,42,.10)!important;z-index:2;}
.icon-btn:active{transform:translateY(0) scale(.98)!important;}
.icon-btn.view:hover,.icon-btn.edit:hover{border-color:#93c5fd;background:#eff6ff;}
.icon-btn.save:hover{border-color:#86efac;background:#ecfdf5;}
.icon-btn.delete:hover{border-color:#fecaca;background:#fff1f2;}
.btn,.nav-btn,.final-card{transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease,background .12s ease,color .12s ease!important;}
.nav-btn.active{box-shadow:inset 3px 0 0 #2563eb,0 6px 14px rgba(37,99,235,.08);}
.nav-btn:hover{transform:translateX(2px)!important;}
.final-card:hover{transform:translateY(-1px)!important;box-shadow:0 10px 24px rgba(15,23,42,.075)!important;}

/* Calendario con colores de advertencia, sin parpadeo */
.calendar{animation:viewSoftFade .12s ease-out both!important;}
.calendar .cal-day{transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease,background .12s ease!important;}
.calendar .cal-day:hover:not(.empty){transform:translateY(-1px);box-shadow:0 8px 16px rgba(15,23,42,.10);}
.calendar .cal-day.red{background:#fef2f2!important;color:#b91c1c!important;border-color:#fecaca!important;font-weight:950;}
.calendar .cal-day.yellow{background:#fffbeb!important;color:#b45309!important;border-color:#fde68a!important;font-weight:950;}
.calendar .cal-day.green{background:#ecfdf5!important;color:#047857!important;border-color:#bbf7d0!important;font-weight:950;}
.calendar .cal-day.red .count{background:#dc2626;color:white;}
.calendar .cal-day.yellow .count{background:#d97706;color:white;}
.calendar .cal-day.green .count{background:#16a34a;color:white;}
.calendar .cal-day .count{min-width:17px;height:17px;border-radius:999px;display:grid;place-items:center;right:3px;bottom:2px;font-size:9px;box-shadow:0 3px 8px rgba(15,23,42,.12);}
.cal-item{transition:background .12s ease,box-shadow .12s ease,border-color .12s ease!important;}
.cal-item:hover{box-shadow:0 6px 14px rgba(15,23,42,.07);border-color:#bfdbfe;background:#fff;}


/* ===== Animación suave de carga entre vistas ===== */
.view-loading{position:fixed;inset:74px 0 0 245px;background:rgba(246,248,251,.72);backdrop-filter:blur(3px);z-index:60;display:flex;align-items:center;justify-content:center;gap:12px;font-weight:950;color:#1e293b;animation:viewSoftFade .12s ease-out both;}
.mini-spinner{width:26px;height:26px;border:3px solid #dbeafe;border-top-color:#2563eb;border-radius:999px;animation:miniSpin .75s linear infinite;}
@keyframes miniSpin{to{transform:rotate(360deg)}}
@media(max-width:980px){.view-loading{inset:0}}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important;}
}


/* REV21 calendario navegable */
.cal-item.cal-link{cursor:pointer;position:relative;}
.cal-item.cal-link:hover{border-color:#60a5fa!important;box-shadow:0 10px 24px rgba(37,99,235,.13)!important;background:#ffffff!important;}
.cal-item.cal-link::after{content:'Abrir';position:absolute;right:10px;top:10px;font-size:10px;font-weight:950;color:#2563eb;background:#eff6ff;border:1px solid #bfdbfe;border-radius:999px;padding:3px 7px;opacity:.0;transform:translateX(4px);transition:.12s ease;}
.cal-item.cal-link:hover::after{opacity:1;transform:translateX(0);}
.req-row-focus td{animation:reqFocusPulse 1.8s ease-out 1!important;border-top-color:#60a5fa!important;border-bottom-color:#60a5fa!important;background:#eff6ff!important;}
@keyframes reqFocusPulse{0%{box-shadow:0 0 0 0 rgba(37,99,235,.30)}60%{box-shadow:0 0 0 6px rgba(37,99,235,.08)}100%{box-shadow:0 0 0 0 rgba(37,99,235,0)}}

/* ===== Vista operarios / base maestra ===== */
.emp-search-wrap{position:relative}.emp-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.emp-data{background:#f8fafc;border:1px solid #e2e8f0;border-radius:16px;padding:12px}.emp-data label{display:block;margin-bottom:4px}.emp-data b{font-size:14px}.emp-detail-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}.emp-autobox{border:1px solid #bfdbfe;background:#eff6ff;border-radius:16px;padding:12px;margin:10px 0}.emp-hint{font-size:12px;color:#475569;margin-top:7px}.emp-result-list{border:1px solid #dbe3ef;border-radius:14px;background:white;margin-top:8px;overflow:hidden}.emp-result-item{padding:10px 12px;border-bottom:1px solid #eef2f7;cursor:pointer}.emp-result-item:hover{background:#eff6ff}.emp-result-item:last-child{border-bottom:0}@media(max-width:980px){.emp-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.emp-grid{grid-template-columns:1fr}}

/* ===== Informes ===== */
.report-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px}.report-card{background:white;border:1px solid var(--line);border-radius:20px;padding:16px;box-shadow:0 8px 24px rgba(15,23,42,.05)}.report-card b{font-size:26px}.report-actions{display:flex;gap:8px;flex-wrap:wrap}.report-print-head{display:none}@media(max-width:980px){.report-grid{grid-template-columns:repeat(2,1fr)}}@media(max-width:620px){.report-grid{grid-template-columns:1fr}}@media print{aside,.top,#calendarToggle,.calendar,#syncMiniStatus,.panel-head .toolbar,.report-actions,.no-print{display:none!important}.app{display:block}.content{padding:0!important}.panel,.card,.report-card{box-shadow:none!important;border:1px solid #ddd!important}.report-print-head{display:block;margin-bottom:12px}.table-wrap{overflow:visible}body{background:white}.panel-head{border-bottom:1px solid #ddd}.semaforo,.status-pill{border:1px solid #999!important;color:#111!important;background:white!important}}


/* ===== Informes con logo / impresión profesional ===== */
.report-print-head{display:none}
.report-toolbar-note{border:1px solid #dbeafe;background:#eff6ff;color:#1e3a8a;border-radius:16px;padding:12px 14px;font-size:13px;font-weight:800;margin-bottom:14px}
.cond-pill{display:inline-flex;align-items:center;border-radius:999px;padding:6px 9px;font-weight:950;font-size:11px;border:1px solid;white-space:nowrap;text-transform:uppercase;letter-spacing:.02em}
.cond-ok{background:#ecfdf5;color:#047857;border-color:#bbf7d0}.cond-bad{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.report-print-logo{height:62px;width:auto;object-fit:contain}
@media print{
  body{background:white!important;color:#111827!important}
  aside,.top,#calendarToggle,.calendar,#syncMiniStatus,.no-print,.report-actions,.view-loading{display:none!important}
  .app{display:block!important;min-height:auto!important}.content{padding:0!important;animation:none!important}.panel,.card,.final-card,.report-card{box-shadow:none!important;border-color:#cbd5e1!important;break-inside:avoid}
  .report-print-head{display:flex!important;align-items:center;justify-content:space-between;gap:16px;border-bottom:3px solid #0f5f82;padding:0 0 12px;margin-bottom:14px}
  .report-print-head h2{margin:0;font-size:20px;color:#0f172a}.report-print-head .meta{font-size:11px;color:#334155;text-align:right;line-height:1.45}
  .table-wrap{overflow:visible!important}table{font-size:10.5px!important}th,td{padding:7px!important}th{background:#f1f5f9!important;color:#334155!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .semaforo,.status-pill,.cond-pill{font-size:9.5px!important;padding:4px 6px!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  @page{size:A4 landscape;margin:10mm}
}



/* ===== Informe habilitados / inhabilitados - vista final ===== */
.report-sheet{background:white;border:1px solid var(--line);border-radius:18px;padding:26px 28px 20px;box-shadow:0 8px 24px rgba(15,23,42,.05)}
.report-sheet .report-print-head{display:flex;align-items:center;justify-content:space-between;gap:24px;border-bottom:3px solid #0f4f86;padding-bottom:14px;margin-bottom:18px}
.report-sheet .report-print-logo{height:78px;width:auto;object-fit:contain}.report-title-block{text-align:center;flex:1}.report-title-block h2{margin:0;color:#0d3266;letter-spacing:.08em;font-size:28px}.report-title-block h3{margin:12px 0 0;font-size:17px;color:#111827}.report-print-head .meta{min-width:170px;font-size:12px;line-height:1.8;color:#0f172a}.report-section-title{margin:16px 0 10px;color:#0d3266;font-size:15px;letter-spacing:.04em}.report-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin:8px 0 12px}.summary-box{border:1px solid #cbd5e1;border-radius:9px;padding:14px 18px;display:flex;align-items:center;gap:14px;background:#fff}.summary-box span{text-transform:uppercase;font-size:11px;font-weight:950}.summary-box b{display:block;font-size:25px;margin-top:4px}.summary-box.total{border-color:#bfdbfe;background:linear-gradient(90deg,#fff,#f8fbff)}.summary-box.ok{border-color:#bbf7d0;background:linear-gradient(90deg,#fff,#f0fdf4)}.summary-box.bad{border-color:#fecaca;background:linear-gradient(90deg,#fff,#fef2f2)}.summary-icon{width:42px;height:42px;border-radius:999px;display:grid;place-items:center;font-size:24px;font-weight:950}.total .summary-icon{background:#dbeafe}.ok .summary-icon{background:#16a34a;color:white}.bad .summary-icon{background:#ef4444;color:white}.report-mini-counts{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 14px}.report-mini-counts span{border:1px solid #e2e8f0;background:#f8fafc;border-radius:999px;padding:6px 10px;font-size:12px}.report-table th{background:#0f4f86!important;color:white!important;text-align:center;font-size:11px}.report-table td{font-size:13px}.report-table td:nth-child(1),.report-table td:nth-child(2),.report-table td:nth-child(3),.report-table td:nth-child(5){text-align:center}.cond-pill{gap:7px;min-width:128px;justify-content:center}.cond-dot{width:9px;height:9px;border-radius:99px;background:currentColor;display:inline-block}.report-reference{font-size:12px;margin-top:12px}.report-refe const state={user:null,view:'dashboard',plants:[],works:[],records:[],users:[],loaded:false}; window.state=state;
function $(id){return document.getElementById(id)} function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))} function norm(v){return String(v||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase().trim().replace(/\s+/g,' ')} function uid(p='id'){return p+'_'+Math.random().toString(36).slice(2)+Date.now().toString(36)} function todayStr(){return new Date().toISOString().slice(0,10)}
function setProgress(p,t){$('loadBar').style.width=p+'%';$('loadText').textContent=t;$('loadSteps').innerHTML+='<div>✅ '+esc(t)+'</div>'} function showSync(msg){const el=$('syncMiniStatus');el.textContent=msg;el.classList.add('show');clearTimeout(window.__syncMiniTimer);window.__syncMiniTimer=setTimeout(()=>el.classList.remove('show'),1600)}
function userKeyMaster(){const n=norm(state.user&&state.user.name); if(n.includes('SERGIO'))return'sergio'; if(n.includes('EDUARDO'))return'eduardo'; if(n.includes('SORIO'))return'sorio'; return'matias'} function isAdmin(){return !!(state.user&&state.user.admin)} function masterWorksForUser(){return MASTER_WORKS[userKeyMaster()]||MASTER_WORKS.matias}
function canonicalWork(v){const n=norm(v); if(n.includes('ARAUCO'))return'ARAUCO'; if(n.includes('NOURYON'))return'NOURYON'; if(n.includes('SWIFT'))return'SWIFT'; if(n.includes('TSM'))return'TSM'; if(n.includes('CENTRAL PUERTO'))return'CENTRAL PUERTO'; if(n.includes('CARGILL')||n==='PPA'||n.includes('PPA')||n.includes('P.A'))return'CARGILL VGG / PPA'; if(n.includes('LDC')||n.includes('DREYFUS'))return'LDC LAGOS / TIMBÚES'; if(n.includes('EVONIK'))return'EVONIK'; if(n.includes('ACINDAR'))return'ACINDAR'; if(n.includes('PAMPA'))return'PAMPA'; if(n.includes('BOORT'))return'BOORTMALT'; return''}
function bucketOf(r){return r.bucket||r.record_type||r.type||''} function recordWork(r){return canonicalWork([r.plant,r.planta,r.work,r.obra,r.name,r.nombre,r.display_name,r.raw&&r.raw.planta,r.raw&&r.raw.obra,r.raw&&r.raw.ultimaObra].join(' ')) || r.work || r.plant || ''} function canSee(r){if(isAdmin())return true; const cw=recordWork(r); return !!cw && masterWorksForUser().map(norm).includes(norm(cw))} function visibleRecords(bucket){let arr=state.records.filter(r=>(!bucket||bucketOf(r)===bucket)&&canSee(r)); const wf=$('workFilter')?$('workFilter').value:'TODAS'; if(wf&&wf!=='TODAS')arr=arr.filter(r=>norm(recordWork(r))===norm(wf)); return arr}

function tipoMovimiento(r){const raw=r&&r.raw||{}; const t=raw.tipoMovimiento||raw.modulo||raw.tipo||''; const n=norm(t); if(n.includes('REINCORPOR'))return 'reincorporacion'; if(n.includes('PLANTA'))return 'baja_planta'; return (bucketOf(r)==='bajas')?'baja_general':''}
function isBajaGeneral(r){return bucketOf(r)==='bajas' && tipoMovimiento(r)==='baja_general'}
function isBajaPlanta(r){return bucketOf(r)==='bajas' && tipoMovimiento(r)==='baja_planta'}
function isReincorporacion(r){return bucketOf(r)==='bajas' && tipoMovimiento(r)==='reincorporacion'}
function movimientoOrden(tm){return tm==='reincorporacion'?3:(tm==='baja_planta'?2:(tm==='baja_general'?1:0))}
function bajaWork(r){const raw=r&&r.raw||{}; return canonicalWork([raw.ultimaObra,raw.planta,raw.obra,r.work,r.plant,r.display_name].join(' '))||recordWork(r)}
function canSeeBajaMove(r){if(isAdmin())return true; const w=bajaWork(r); return !!w && masterWorksForUser().map(norm).includes(norm(w))}
function isActiveBajaRecord(r){const leg=legajoOf(r); if(!leg)return false; let last=null; state.records.forEach(x=>{if(norm(legajoOf(x))!==norm(leg))return; const tm=tipoMovimiento(x); if(!['baja_general','baja_planta','reincorporacion'].includes(tm))return; const item={r:x,date:moveDate(x),tm,ord:movimientoOrden(tm)}; if(!last||String(item.date)>String(last.date)||(String(item.date)===String(last.date)&&item.ord>last.ord))last=item;}); return !!(last&&(last.tm==='baja_general'||last.tm==='baja_planta'))}
function allBajasGenerales(){return state.records.filter(isBajaGeneral)}
function allBajasPlanta(){let rows=state.records.filter(isBajaPlanta); const wf=$('workFilter')?$('workFilter').value:'TODAS'; if(wf&&wf!=='TODAS')rows=rows.filter(r=>norm(bajaWork(r))===norm(wf)); if(!isAdmin())rows=rows.filter(canSeeBajaMove); return rows}

function empVal(e,k){return (e&&e[k])?String(e[k]).trim():''}
function empLegajo(e){return empVal(e,'Legajo')}
function empNombre(e){return empVal(e,'Apellido, Nombre')}
function empLabel(e){return empLegajo(e)+' - '+empNombre(e)}
function empNormText(e){return norm([empLegajo(e),empNombre(e),empVal(e,'Documento'),empVal(e,'CUIL')].join(' '))}
function findEmpByLegajo(leg){const n=norm(String(leg||'').replace(/^0+/,'')); return EMPLEADOS_MAESTROS.find(e=>norm(empLegajo(e).replace(/^0+/,''))===n)}
function findEmpFromText(txt){const raw=String(txt||''); const leg=raw.split('-')[0].trim(); return findEmpByLegajo(leg)||EMPLEADOS_MAESTROS.find(e=>empNormText(e).includes(norm(raw)))}
function searchEmps(q,limit=12){const nq=norm(q); if(!nq)return []; return EMPLEADOS_MAESTROS.filter(e=>empNormText(e).includes(nq)).slice(0,limit)}
function recordsByEmp(emp){const leg=norm(empLegajo(emp).replace(/^0+/,'')); const nom=norm(empNombre(emp)); return (state.records||[]).filter(r=>{const rleg=norm(String(legajoOf(r)||r.identifier||'').replace(/^0+/,'')); const rnom=norm(r.display_name||((r.raw||{}).nombre)||''); return (leg&&rleg===leg)||(nom&&rnom===nom)})}

const __alsiRenderOriginal = render;
render = function(){
  if(state.view==='informes') return renderInformes();

function informeBucketLabel(b){return {personas:'Personal',monotributistas:'Monotributo',empresas:'Empresa',vehiculos:'Vehículos'}[b]||labelBucket(b)}
function informeCondicionRegistro(r){
  let vencido=false;
  Object.values(r.docs||{}).forEach(v=>{
    const f=typeof v==='object'?(v.fecha||v.valor||''):(v||'');
    if(String(f).toUpperCase()==='NA')return;
    const d=diffDays(f);
    if(d!==null && d<0) vencido=true;
  });
  return vencido?'Inhabilitado':'Habilitado';
}
function informeCondicionPill(c){
  return '<span class="cond-pill '+(c==='Inhabilitado'?'cond-bad':'cond-ok')+'"><span class="cond-dot"></span>'+esc(String(c||'').toUpperCase())+'</span>';
}
function informeRegistroRows(){
  const buckets=['personas','monotributistas','empresas','vehiculos'];
  const rows=[];
  buckets.forEach(bucket=>visibleRecords(bucket).forEach(r=>{
    rows.push({
      bucket,
      categoria:informeBucketLabel(bucket),
      condicion:informeCondicionRegistro(r),
      ident:r.identifier||((r.raw||{}).legajo)||'',
      nombre:r.display_name||((r.raw||{}).nombre)||r.company||'',
      obra:recordWork(r)||r.work||r.plant||((r.raw||{}).obra)||''
    });
  }));
  return rows.sort((a,b)=>{
    const ca=a.condicion==='Inhabilitado'?0:1, cb=b.condicion==='Inhabilitado'?0:1;
    return (ca-cb)||String(a.categoria).localeCompare(String(b.categoria))||String(a.nombre).localeCompare(String(b.nombre))||String(a.ident).localeCompare(String(b.ident));
  });
}
function informeFiltrado(){
  let rows=informeRegistroRows();
  const bucket=$('infBucket')?.value||'';
  const condicion=$('infCondicion')?.value||'';
  const q=norm($('infQ')?.value||'');
  if(bucket) rows=rows.filter(x=>x.bucket===bucket);
  if(condicion) rows=rows.filter(x=>x.condicion===condicion);
  if(q) rows=rows.filter(x=>norm([x.condicion,x.categoria,x.ident,x.nombre,x.obra].join(' ')).includes(q));
  return rows;
}
function informeStats(rows){
  const st={total:rows.length, habilitados:0, inhabilitados:0, personas:0, monotributistas:0, empresas:0, vehiculos:0};

}

  if($('infCntMono')) $('infCntMono').textContent=st.monotributistas;

  if($('infCntVeh')) $('infCntVeh').textContent=st.vehiculos;
  $('infRows').innerHTML=rows.map(x=>'<tr><td>'+informeCondicionPill(x.condicion)+'</td><td>'+esc(x.categoria)+'</td><td><b>'+esc(x.ident)+'</b></td><td>'+esc(x.nombre)+'</td><td>'+esc(x.obra)+'</td></tr>').join('')||'<tr><td colspan="5" class="empty">Sin registros para el filtro seleccionado.</td></tr>';
}
function exportInformeCsv(){
  const rows=informeFiltrado();
  const head=['Condicion','Categoria','Leg/ID','Nombre','Obra','Fecha hora informe','Usuario'];
  const usuario=(state.user&&state.user.name)||'';
  const fechaHora=new Date().toLocaleString('es-AR');
  const data=[head].concat(rows.map(x=>[x.condicion,x.categoria,x.ident,x.nombre,x.obra,fechaHora,usuario]));
  const csv=data.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(';')).join('\n');
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}), a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download='informe_habilitaciones_'+todayStr()+'.csv'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
}

<script>
/* ===== ALSI REV21 - Activadores visuales seguros SUAVES ===== */
(function(){
  'use strict';
  function markSelectedRow(ev){
    const tr=ev.target.closest&&ev.target.closest('tbody tr');
    if(!tr || tr.querySelector('.empty')) return;
    const tbody=tr.parentElement;
    if(tbody) tbody.querySelectorAll('tr.alsi-row-selected').forEach(r=>r.classList.remove('alsi-row-selected'));
    tr.classList.add('alsi-row-selected');
  }
  function animateViewOnce(){
    const view=document.getElementById('view');
    if(!view) return;
    view.classList.remove('view-switching');
    void view.offsetWidth;
    view.classList.add('view-switching');
    window.setTimeout(()=>view.classList.remove('view-switching'),150);
  }
  document.addEventListener('click',markSelectedRow,true);
  document.addEventListener('click',function(ev){
    if(ev.target.closest&&ev.target.closest('.nav-btn')) window.setTimeout(animateViewOnce,35);
  },true);
})();
</script>
<script>
(function(){
  function bindLoginSeguro(){
    var b=document.getElementById('loginBtn');
    var p=document.getElementById('loginPass');
    if(b && window.alsiLogin){ b.onclick=function(ev){ ev.preventDefault(); window.alsiLogin(); }; }
    if(p && window.alsiLogin && !p.dataset.loginSeguro){ p.dataset.loginSeguro='1'; p.addEventListener('keydown',function(e){ if(e.key==='Enter'){ e.preventDefault(); window.alsiLogin(); } }); }
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',bindLoginSeguro); else bindLoginSeguro();
  setTimeout(bindLoginSeguro,300);
})();
</script>
